# frozen_string_literal: true

# StandardRB Configuration for monorepo root
# https://github.com/standardrb/standard

ignore:
  - 'vendor/**/*'
  - '**/vendor/**/*'
  - 'node_modules/**/*'
  - 'tmp/**/*'
  - 'coverage/**/*'
  - 'doc/**/*'
  - 'pkg/**/*'
  - 'docs-site/**/*'
  - 'reference/upstream-src/**/*'
  - '.git/**/*'
  - '.claude/**/*'
  - '.ruby-lsp/**/*'
