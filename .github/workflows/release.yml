name: Release

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Immutable tagged release commit to recover
        required: true
        type: string
  push:
    branches:
      - main

permissions: {}

jobs:
  detect-pending-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pending: ${{ steps.detect.outputs.pending }}
    steps:
      - name: Checkout exact pushed commit with history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Detect an unpublished manifest release
        id: detect
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require "json"
          require "set"

          manifest = JSON.parse(File.read(".release-please-manifest.json"))
          config = JSON.parse(File.read("release-please-config.json"))
          packages = config.fetch("packages")
          tags = IO.popen(["git", "tag", "--list"], &:read).lines(chomp: true).to_set

          missing = manifest.filter_map do |path, version|
            package = packages.fetch(path)
            component = package["component"] || package["package-name"] || File.basename(path)
            include_component = package.fetch(
              "include-component-in-tag",
              config.fetch("include-component-in-tag", false)
            )
            separator = package["tag-separator"] || config["tag-separator"] || "-"
            configured_tag = include_component ? "#{component}#{separator}v#{version}" : "v#{version}"
            legacy_tag = "#{component}-v#{version}"
            expected_tags = [configured_tag, legacy_tag].uniq
            next if expected_tags.any? { |tag| tags.include?(tag) }

            "#{path} #{version} (expected #{expected_tags.join(" or ")})"
          end

          pending = !missing.empty?
          puts(pending ? "Pending release components:\n- #{missing.join("\n- ")}" : "Manifest release already tagged.")
          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") { |output| output.puts("pending=#{pending}") }
          RUBY

  release-ci:
    needs: detect-pending-release
    if: needs.detect-pending-release.outputs.pending == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  release-integration:
    needs: detect-pending-release
    if: needs.detect-pending-release.outputs.pending == 'true'
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/integration.yml
    with:
      full: true

  release-pr:
    needs:
      - detect-pending-release
      - release-ci
      - release-integration
    if: >-
      always() &&
      github.event_name == 'push' &&
      needs.detect-pending-release.result == 'success' &&
      (needs.detect-pending-release.outputs.pending == 'false' ||
        (needs.release-ci.result == 'success' && needs.release-integration.result == 'success'))
    runs-on: ubuntu-latest
    concurrency:
      group: release-please-pr
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Create or update the linked release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-pr
    if: github.event_name == 'push' && needs.release-pr.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: rubygems-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version

      - name: Prepare and validate every release artifact
        run: ruby scripts/release/publish_gems.rb prepare tmp/release-gems

      - name: Configure RubyGems Trusted Publishing
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Publish and checksum-verify every release artifact
        run: ruby scripts/release/publish_gems.rb publish tmp/release-gems

  recover-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: rubygems-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_COMMIT: ${{ inputs.release_commit }}
    steps:
      - name: Validate the recovery request
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          test "$DISPATCH_REF" = "refs/heads/main"
          ruby -e 'abort "release_commit must be a lowercase 40-character commit SHA" unless ENV.fetch("RELEASE_COMMIT").match?(/\A[0-9a-f]{40}\z/)'

      - name: Checkout the exact tagged release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.release_commit }}

      - name: Verify the release commit is immutable and on main
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          git merge-base --is-ancestor "$RELEASE_COMMIT" refs/remotes/origin/main

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version

      - name: Prepare and validate every recovery artifact
        run: |
          # GITHUB_SHA identifies the dispatch workflow, not the checked-out release.
          ruby -r./scripts/release/publish_gems \
            -e 'ReleasePublisher::Preparer.new(root: Dir.pwd, release_commit: ENV.fetch("RELEASE_COMMIT")).call("tmp/release-gems")'

      - name: Configure RubyGems Trusted Publishing
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0

      - name: Publish and checksum-verify every recovery artifact
        run: ruby scripts/release/publish_gems.rb publish tmp/release-gems
