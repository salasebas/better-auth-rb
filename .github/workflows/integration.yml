name: Integration

on:
  workflow_call:
    inputs:
      full:
        description: Run every integration scope
        required: false
        type: boolean
        default: false
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

env:
  BETTER_AUTH_URL: http://localhost:3000
  BETTER_AUTH_ADAPTER_INTEGRATION: "1"
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth
  BETTER_AUTH_MYSQL_URL: mysql2://user:password@127.0.0.1:3306/better_auth
  BETTER_AUTH_MSSQL_URL: tinytds://sa:Password123!@127.0.0.1:1433/better_auth?timeout=30
  BETTER_AUTH_MSSQL_MASTER_URL: tinytds://sa:Password123!@127.0.0.1:1433/master?timeout=30
  BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test

jobs:
  changes:
    name: Select integration scopes
    runs-on: ubuntu-latest
    outputs:
      core_sql: ${{ steps.select.outputs.core_sql }}
      adapters: ${{ steps.select.outputs.adapters }}
      redis: ${{ steps.select.outputs.redis }}
      cli: ${{ steps.select.outputs.cli }}
      rails: ${{ steps.select.outputs.rails }}
      hanami: ${{ steps.select.outputs.hanami }}
      mongo: ${{ steps.select.outputs.mongo }}
      mysql_smoke: ${{ steps.select.outputs.mysql_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect pull request changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            full:
              - "packages/better_auth/**"
              - "!packages/better_auth/**/*.md"
              - "Gemfile"
              - "Gemfile.lock"
              - "Rakefile"
              - ".ruby-version"
              - "docker-compose.yml"
              - "scripts/**"
              - "test/support/**"
              - ".github/workflows/**"
            api_key:
              - "packages/better_auth-api-key/**"
              - "!packages/better_auth-api-key/**/*.md"
            passkey:
              - "packages/better_auth-passkey/**"
              - "!packages/better_auth-passkey/**/*.md"
            oauth_provider:
              - "packages/better_auth-oauth-provider/**"
              - "!packages/better_auth-oauth-provider/**/*.md"
            scim:
              - "packages/better_auth-scim/**"
              - "!packages/better_auth-scim/**/*.md"
            sso:
              - "packages/better_auth-sso/**"
              - "!packages/better_auth-sso/**/*.md"
            stripe:
              - "packages/better_auth-stripe/**"
              - "!packages/better_auth-stripe/**/*.md"
            redis:
              - "packages/better_auth-redis-storage/**"
              - "!packages/better_auth-redis-storage/**/*.md"
            cli:
              - "packages/better_auth-cli/**"
              - "!packages/better_auth-cli/**/*.md"
            rails:
              - "packages/better_auth-rails/**"
              - "!packages/better_auth-rails/**/*.md"
            hanami:
              - "packages/better_auth-hanami/**"
              - "!packages/better_auth-hanami/**/*.md"
            mongo:
              - "packages/better_auth-mongodb/**"
              - "packages/better_auth-mongo-adapter/**"
              - "!packages/better_auth-mongodb/**/*.md"
              - "!packages/better_auth-mongo-adapter/**/*.md"
            mysql_smoke:
              - "test/mysql_plugin_schema_smoke_test.rb"

      - name: Build integration selection
        id: select
        env:
          FULL_EVENT: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group' || inputs.full }}
          FULL_CHANGED: ${{ steps.filter.outputs.full || 'false' }}
          API_KEY_CHANGED: ${{ steps.filter.outputs.api_key || 'false' }}
          PASSKEY_CHANGED: ${{ steps.filter.outputs.passkey || 'false' }}
          OAUTH_PROVIDER_CHANGED: ${{ steps.filter.outputs.oauth_provider || 'false' }}
          SCIM_CHANGED: ${{ steps.filter.outputs.scim || 'false' }}
          SSO_CHANGED: ${{ steps.filter.outputs.sso || 'false' }}
          STRIPE_CHANGED: ${{ steps.filter.outputs.stripe || 'false' }}
          REDIS_CHANGED: ${{ steps.filter.outputs.redis || 'false' }}
          CLI_CHANGED: ${{ steps.filter.outputs.cli || 'false' }}
          RAILS_CHANGED: ${{ steps.filter.outputs.rails || 'false' }}
          HANAMI_CHANGED: ${{ steps.filter.outputs.hanami || 'false' }}
          MONGO_CHANGED: ${{ steps.filter.outputs.mongo || 'false' }}
          MYSQL_SMOKE_CHANGED: ${{ steps.filter.outputs.mysql_smoke || 'false' }}
        run: |
          set -euo pipefail
          selected() {
            [ "$FULL_EVENT" = "true" ] || [ "$FULL_CHANGED" = "true" ] || [ "$1" = "true" ]
          }

          full=false
          if [ "$FULL_EVENT" = "true" ] || [ "$FULL_CHANGED" = "true" ]; then
            full=true
          fi

          packages=()
          if selected "$API_KEY_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-api-key"); fi
          if selected "$PASSKEY_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-passkey"); fi
          if selected "$OAUTH_PROVIDER_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-oauth-provider"); fi
          if selected "$SCIM_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-scim"); fi
          if selected "$SSO_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-sso"); fi
          if selected "$STRIPE_CHANGED" || [ "$MONGO_CHANGED" = "true" ]; then packages+=("better_auth-stripe"); fi

          if [ "${#packages[@]}" -eq 0 ]; then
            adapters='[]'
          else
            adapters="$(printf '%s\n' "${packages[@]}" | jq -R . | jq -sc .)"
          fi

          echo "core_sql=$full" >> "$GITHUB_OUTPUT"
          echo "adapters=$adapters" >> "$GITHUB_OUTPUT"
          if selected "$REDIS_CHANGED" || [ "$API_KEY_CHANGED" = "true" ]; then echo "redis=true" >> "$GITHUB_OUTPUT"; else echo "redis=false" >> "$GITHUB_OUTPUT"; fi
          if selected "$CLI_CHANGED"; then echo "cli=true" >> "$GITHUB_OUTPUT"; else echo "cli=false" >> "$GITHUB_OUTPUT"; fi
          if selected "$RAILS_CHANGED"; then echo "rails=true" >> "$GITHUB_OUTPUT"; else echo "rails=false" >> "$GITHUB_OUTPUT"; fi
          if selected "$HANAMI_CHANGED"; then echo "hanami=true" >> "$GITHUB_OUTPUT"; else echo "hanami=false" >> "$GITHUB_OUTPUT"; fi
          if selected "$MONGO_CHANGED"; then echo "mongo=true" >> "$GITHUB_OUTPUT"; else echo "mongo=false" >> "$GITHUB_OUTPUT"; fi
          if selected "$MYSQL_SMOKE_CHANGED" || [ "${#packages[@]}" -gt 0 ]; then echo "mysql_smoke=true" >> "$GITHUB_OUTPUT"; else echo "mysql_smoke=false" >> "$GITHUB_OUTPUT"; fi

  integration-core-sql:
    name: Core SQL integration
    needs: changes
    if: needs.changes.outputs.core_sql == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 40s
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run core SQL integration tests
        working-directory: packages/better_auth
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:integration

  integration-adapters:
    name: Adapter integration (${{ matrix.package }})
    needs: changes
    if: needs.changes.outputs.adapters != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.adapters) }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 40s
      mongo:
        image: mongo:8.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Wait for MongoDB
        run: |
          set -euo pipefail
          container="$(docker ps --filter ancestor=mongo:8.0 --format '{{.ID}}' | head -n 1)"
          for attempt in $(seq 1 30); do
            if docker exec "$container" mongosh --quiet --eval 'db.adminCommand({ping: 1})' >/dev/null 2>&1; then
              exit 0
            fi
            if [ "$attempt" = "30" ]; then
              docker logs "$container"
              exit 1
            fi
            sleep 2
          done

      - name: Run focused adapter integration tests
        working-directory: packages/${{ matrix.package }}
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:integration

  integration-redis:
    name: Redis integration
    needs: changes
    if: needs.changes.outputs.redis == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run redis-storage integration tests
        working-directory: packages/better_auth-redis-storage
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          REDIS_INTEGRATION: "1"
          REDIS_URL: redis://localhost:6379/0
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:integration

      - name: Run API-key Redis secondary-storage integration tests
        working-directory: packages/better_auth-api-key
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          REDIS_INTEGRATION: "1"
          REDIS_URL: redis://localhost:6379/0
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:redis_integration

  integration-cli:
    name: CLI migration integration
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream Better Auth sources
        run: ./scripts/fetch-upstream-better-auth.sh

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run CLI migration parity tests
        working-directory: packages/better_auth-cli
        env:
          BETTER_AUTH_CLI_RUN_DB_INTEGRATION: "1"
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:integration

  integration-rails:
    name: Rails database integration
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Rails database integration specs
        working-directory: packages/better_auth-rails
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          SPEC_OPTS: --require ${{ github.workspace }}/test/support/strict_rspec
        run: bundle exec rake test:integration

  integration-hanami:
    name: Hanami database integration
    needs: changes
    if: needs.changes.outputs.hanami == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 40s
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Hanami database integration specs
        working-directory: packages/better_auth-hanami
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          SPEC_OPTS: --require ${{ github.workspace }}/test/support/strict_rspec
        run: bundle exec rake test:integration

  integration-mongodb:
    name: MongoDB integration (${{ matrix.package }})
    needs: changes
    if: needs.changes.outputs.mongo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - better_auth-mongodb
          - better_auth-mongo-adapter
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Start MongoDB replica set
        run: |
          set -euo pipefail
          docker run --detach --name mongodb-replica --publish 27017:27017 mongo:8.0 --replSet rs0 --bind_ip_all
          for attempt in $(seq 1 60); do
            if docker exec mongodb-replica mongosh --quiet --eval 'db.adminCommand({ping: 1})' >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              docker logs mongodb-replica
              exit 1
            fi
            sleep 2
          done
          docker exec mongodb-replica mongosh --quiet --eval 'rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})'
          for attempt in $(seq 1 60); do
            if docker exec mongodb-replica mongosh --quiet --eval 'quit(db.hello().isWritablePrimary ? 0 : 1)'; then
              exit 0
            fi
            if [ "$attempt" = "60" ]; then
              docker logs mongodb-replica
              exit 1
            fi
            sleep 2
          done

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run MongoDB adapter integration tests
        working-directory: packages/${{ matrix.package }}
        env:
          BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test?directConnection=true
          BETTER_AUTH_MONGODB_REPLICA_SET_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test?replicaSet=rs0
          BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:integration

  integration-mysql-plugin-schema-smoke:
    name: Workspace MySQL plugin schema smoke
    needs: changes
    if: needs.changes.outputs.mysql_smoke == 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install MySQL client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev

      - name: Set up Ruby with the workspace bundle
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run MySQL plugin schema smoke test
        env:
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec ruby -Itest -e 'require "./test/mysql_plugin_schema_smoke_test"'

  integration:
    name: Integration
    needs:
      - changes
      - integration-core-sql
      - integration-adapters
      - integration-redis
      - integration-cli
      - integration-rails
      - integration-hanami
      - integration-mongodb
      - integration-mysql-plugin-schema-smoke
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every selected integration job to pass
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          jq --exit-status 'all(.[]; .result == "success" or .result == "skipped")' <<< "$NEEDS"
