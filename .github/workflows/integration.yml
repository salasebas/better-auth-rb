name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "packages/better_auth-api-key/**"
      - "packages/better_auth-passkey/**"
      - "packages/better_auth-scim/**"
      - "packages/better_auth-sso/**"
      - "packages/better_auth-oauth-provider/**"
      - "packages/better_auth-redis-storage/**"
      - "packages/better_auth-rails/**"
      - "packages/better_auth-hanami/**"
      - "packages/better_auth-mongodb/**"
      - "packages/better_auth-mongo-adapter/**"
      - "test/mysql_plugin_schema_smoke_test.rb"
      - ".github/workflows/integration.yml"

concurrency:
  group: integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  BETTER_AUTH_ADAPTER_INTEGRATION: "1"
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth
  BETTER_AUTH_MYSQL_URL: mysql2://user:password@127.0.0.1:3306/better_auth
  BETTER_AUTH_MSSQL_URL: tinytds://sa:Password123!@127.0.0.1:1433/better_auth?timeout=30
  BETTER_AUTH_MSSQL_MASTER_URL: tinytds://sa:Password123!@127.0.0.1:1433/master?timeout=30
  BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test

jobs:
  integration-redis:
    name: Redis integration (redis-storage + api-key secondary storage)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-redis-storage

      - name: Run redis-storage integration tests
        working-directory: packages/better_auth-redis-storage
        env:
          REDIS_INTEGRATION: "1"
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rake test:integration

      - name: Set up Ruby for api-key
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-api-key

      - name: Run api-key Redis secondary storage integration tests
        working-directory: packages/better_auth-api-key
        env:
          REDIS_INTEGRATION: "1"
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec ruby -Itest -e 'require "./test/better_auth/api_key/redis_secondary_storage_integration_test"'

  integration-sql-adapters:
    name: SQL adapter matrix (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - better_auth-api-key
          - better_auth-passkey
          - better_auth-scim
          - better_auth-sso
          - better_auth-oauth-provider
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 40s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/${{ matrix.package }}

      - name: Run adapter integration tests
        working-directory: packages/${{ matrix.package }}
        run: bundle exec rake test:integration

  integration-rails:
    name: Rails database integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-rails

      - name: Run Rails database integration specs
        working-directory: packages/better_auth-rails
        run: bundle exec rake test:integration

  integration-hanami:
    name: Hanami database integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Password123!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Password123! -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Password123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 40s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-hanami

      - name: Run Hanami database integration specs
        working-directory: packages/better_auth-hanami
        run: bundle exec rake test:integration

  integration-mongodb:
    name: MongoDB integration (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - better_auth-mongodb
          - better_auth-mongo-adapter
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/${{ matrix.package }}

      - name: Run MongoDB integration tests
        working-directory: packages/${{ matrix.package }}
        run: bundle exec rake test

  integration-mysql-plugin-schema-smoke:
    name: Workspace MySQL plugin schema smoke
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run MySQL plugin schema smoke test
        env:
          BETTER_AUTH_ADAPTER_INTEGRATION: "1"
        run: bundle exec ruby -Itest -e 'require "./test/mysql_plugin_schema_smoke_test"'

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - integration-redis
      - integration-sql-adapters
      - integration-rails
      - integration-hanami
      - integration-mongodb
      - integration-mysql-plugin-schema-smoke
    if: always()
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
