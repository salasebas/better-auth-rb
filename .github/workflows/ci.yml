name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  BETTER_AUTH_URL: http://localhost:3000

jobs:
  lint-workspace:
    name: Lint workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run linter
        run: bundle exec standardrb

  test-workspace:
    name: Test workspace release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10 && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run workspace packaging tests
        env:
          RUBYOPT: -r${{ github.workspace }}/test/support/strict_minitest
        run: bundle exec rake test:workspace

  test-core:
    name: Test better_auth (Core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream Better Auth sources
        run: ./scripts/fetch-upstream-better-auth.sh

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth


      - name: Run tests
        working-directory: packages/better_auth
        env:
