name: CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'Rakefile'
      - '.release.yml'
      - '.release-please-manifest.json'
      - 'release-please-config.json'
      - '.standard.yml'
      - 'docker-compose.yml'
      - '.ruby-version'
      - 'scripts/**'
      - 'test/**'
      - 'reference/upstream-better-auth/**'
      - 'docs/**'
      - 'docs-site/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'Rakefile'
      - '.release.yml'
      - '.release-please-manifest.json'
      - 'release-please-config.json'
      - '.standard.yml'
      - 'docker-compose.yml'
      - '.ruby-version'
      - 'scripts/**'
      - 'test/**'
      - 'reference/upstream-better-auth/**'
      - 'docs/**'
      - 'docs-site/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  BETTER_AUTH_URL: http://localhost:3000
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth

jobs:
  lint-workspace:
    name: Lint workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run linter
        run: bundle exec standardrb

  lint-package:
    name: Lint ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - better_auth
          - better_auth-passkey
          - better_auth-cli
          - better_auth-api-key
          - better_auth-rails
          - better_auth-sinatra
          - better_auth-roda
          - better_auth-hanami
          - better_auth-grape
          - better_auth-oauth-provider
          - better_auth-redis-storage
          - better_auth-mongodb
          - better_auth-mongo-adapter
          - better_auth-scim
          - better_auth-oidc
          - better_auth-saml
          - better_auth-sso
          - better_auth-stripe
          - better_auth-telemetry

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/${{ matrix.package }}

      - name: Run linter
        working-directory: packages/${{ matrix.package }}
        run: bundle exec standardrb

  test-workspace:
    name: Test workspace release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install database client headers
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10 && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run workspace packaging tests
        run: bundle exec rake test:workspace

  test-core:
    name: Test better_auth (Core)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream Better Auth sources
        run: ./scripts/fetch-upstream-better-auth.sh

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth


      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test

