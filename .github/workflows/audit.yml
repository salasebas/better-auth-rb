name: Security Audit

on:
  push:
    branches:
      - main
    paths:
      - "**/Gemfile"
      - "**/Gemfile.lock"
      - "script/audit_gems.rb"
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundler-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run bundler-audit
        run: ruby script/audit_gems.rb
