# Auto-label config for actions/labeler.
# Maps changed file paths to domain labels. All matching labels are applied.

core:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth/**"
          - "packages/openauth/**"

adapters:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-rails/**"
          - "packages/better_auth-sinatra/**"
          - "packages/better_auth-hanami/**"
          - "packages/better_auth-grape/**"
          - "packages/better_auth-roda/**"
          - "packages/openauth-rails/**"
          - "packages/openauth-sinatra/**"
          - "packages/openauth-hanami/**"
          - "packages/openauth-grape/**"
          - "packages/openauth-roda/**"

oauth:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-oauth-provider/**"
          - "packages/better_auth-oidc/**"
          - "packages/better_auth-saml/**"
          - "packages/better_auth-sso/**"
          - "packages/openauth-oauth-provider/**"
          - "packages/openauth-oidc/**"
          - "packages/openauth-saml/**"
          - "packages/openauth-sso/**"

credentials:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-passkey/**"
          - "packages/openauth-passkey/**"

database:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-mongodb/**"
          - "packages/better_auth-mongo-adapter/**"
          - "packages/openauth-mongodb/**"
          - "test/mysql_plugin_schema_smoke_test.rb"

cache:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-redis-storage/**"
          - "packages/openauth-redis-storage/**"

enterprise:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-scim/**"
          - "packages/openauth-scim/**"

payments:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-stripe/**"
          - "packages/openauth-stripe/**"

devtools:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-cli/**"
          - "packages/better_auth-telemetry/**"
          - "packages/openauth-cli/**"
          - "packages/openauth-telemetry/**"
          - "script/**"

api-key:
  - changed-files:
      - any-glob-to-any-file:
          - "packages/better_auth-api-key/**"
          - "packages/openauth-api-key/**"

examples:
  - changed-files:
      - any-glob-to-any-file:
          - "examples/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "docs-site/**"
          - "packages/**/README.md"
          - "packages/**/CHANGELOG.md"

release:
  - changed-files:
      - any-glob-to-any-file:
          - "RELEASING.md"
          - ".release.yml"
          - "packages/**/version.rb"
          - "packages/**/*.gemspec"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "docker-compose.yml"
          - "lefthook.yml"
          - "Makefile"
          - "Rakefile"
